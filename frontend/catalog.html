<!DOCTYPE html>
<html lang="ru">
<head>
  <link rel="icon" href="images/favicon.png" type="image/png">
  <link rel="shortcut icon" href="images/favicon.png" type="image/png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Каталог коворкингов — Cowworker</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header class="header">
  <a href="index.html" class="logo">
    <img src="images/favicon.png" alt="Cowworker">
    <span>Cow</span><strong>worker</strong>
  </a>

  <nav class="nav">
    <a href="index.html">Главная</a>
    <a href="catalog.html">Каталог</a>
    <a href="bookings.html">Список бронирований</a>
    <a href="index.html#about">О сервисе</a>
  </nav>

  <button class="login-button" type="button">Войти</button>
</header>

<main class="section page-spots">
  <h1>Каталог коворкингов</h1>

  <div class="search-panel">
    <div class="filters">
      <div class="suggest-wrapper">
        <input id="searchInput" type="text" placeholder="Название" autocomplete="off">
        <div id="nameSuggestions" class="suggestions"></div>
      </div>

      <input id="metroInput" type="text" list="metroStations" placeholder="Метро">
      <datalist id="metroStations"></datalist>

      <input id="maxPriceInput" type="number" step="100" min="0" placeholder="Цена до">
    </div>

    <details class="extra-filters">
      <summary>Дополнительные фильтры</summary>

      <div class="extra-filter-grid">
        <label><input id="quietFilter" type="checkbox"> Низкий уровень шума</label>
        <label><input class="amenityFilter" type="checkbox" value="Wi-Fi"> Wi-Fi</label>
        <label><input class="amenityFilter" type="checkbox" value="Кофе"> Кофе</label>
        <label><input class="amenityFilter" type="checkbox" value="Переговорные"> Переговорные</label>
        <label><input class="amenityFilter" type="checkbox" value="Принтер"> Принтер</label>
        <label><input class="amenityFilter" type="checkbox" value="Кухня"> Кухня</label>
      </div>
    </details>

    <button id="searchButton" class="button button-green search-button">Найти</button>
  </div>

  <p id="searchHint" class="search-hint"></p>

  <div id="coworkingsList" class="cards"></div>
</main>

<script src="js/api.js"></script>
<script src="js/catalog.js"></script>
</body>
</html>
